image: python:3.11

stages:
  - quality
  - build
  - orchestrate

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

quality:
  stage: quality
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -r automation/requirements.txt
    - python -m compileall tests
    - python -m unittest discover -s tests -p "test_*.py"
    - python automation/verify_repo.py

build:
  stage: build
  needs: ["quality"]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push"
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -r automation/requirements.txt
    - python -m compileall automation

orchestrate:
  stage: orchestrate
  needs: ["build"]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - when: never
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -r automation/requirements.txt
    - if [ -n "$GMAIL_OAUTH_TOKEN_JSON" ]; then printf "%s" "$GMAIL_OAUTH_TOKEN_JSON" > automation/token.json; fi
    - export GMAIL_OAUTH_TOKEN=automation/token.json
    - python automation/preflight_credentials.py
    - python automation/run_orchestrator_with_report.py
    - python automation/commit_changes.py
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - automation/last_health_report.json
      - automation/last_orchestrator_report.json
